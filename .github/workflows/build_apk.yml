name: Flutter APK Build

on:
  push:
    branches:
      - main  # Hangi branch'e push yapıldığında çalışacağını seçin
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Kodları GitHub sunucusuna çek
      - uses: actions/checkout@v3

      # 2. Java kurulumu (Android derleme için gerekli)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Flutter kurulumu
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # 4. Bağımlılıkları yükle
      - name: Install dependencies
        run: flutter pub get

      # 5. APK Derleme (Debug sürümü için)
      - name: Build APK
        run: flutter build apk --debug

      # 6. Oluşan APK'yı GitHub üzerinden indirilebilir yap
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
