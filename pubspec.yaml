name: design_all
description: İç Mimarlık Proje ve Tasarım Asistanı
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Tasarım & İkonlar
  lucide_icons: 0.257.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Backend & State
  supabase_flutter: ^2.0.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigasyon
  go_router: ^13.0.0

  # Fotoğraf & Medya
  image_picker: ^1.0.7
  photo_view: ^0.15.0
  cached_network_image: ^3.3.1

  # Renk & Tasarım
  palette_generator: ^0.3.3+3
  flex_color_picker: ^3.4.1

  # AR Ölçü Aracı
  ar_flutter_plugin: ^0.7.3

  # Animasyonlar
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utility
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  uuid: ^4.3.3
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
